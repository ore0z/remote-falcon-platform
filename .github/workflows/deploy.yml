name: Deploy

# One workflow for all 8 services. detect decides which services changed (or
# which the user picked via workflow_dispatch). The build job then runs the
# docker builds in a matrix IN PARALLEL with the test gates, and the deploy
# job just rolls out the already-pushed images. A trailing post-deploy-watch
# job runs the error-rate safety check off the deploy critical path.
#
# Job graph:
#   detect ──┬─► test-unit (matrix) ─┐
#            ├─► test-contract        ├─► deploy (matrix, apply-only) ─► post-deploy-watch
#            ├─► test-e2e             │
#            └─► build (matrix) ──────┘
#
# Why this shape (see also docs/SERVICES.md):
#   - build runs alongside the tests instead of inside deploy, so the ~5-9min
#     image builds overlap the ~5min e2e gate instead of stacking after it.
#     Images are pushed to GHCR tagged by SHA; building an image for a commit
#     that later fails its tests is harmless (deploy is still gated on green).
#   - build uses GHCR registry layer cache (:buildcache) so base images and the
#     libs/schema|auth|test-fixtures stages don't recompile every run. The
#     GraalVM/Quarkus native-compile step itself still reruns on source change.
#   - deploy no longer builds — it resolves config, applies the manifest, waits
#     for rollout, and verifies image+replicas. Fast.
#   - the 10min post-deploy error-rate sleep used to sit inline in every deploy
#     matrix leg (8 idle runners, on the deploy critical path). It now lives in
#     one consolidated post-deploy-watch job that runs after deploy reports
#     done, so the rollout shows complete ~10min sooner. Auto-rollback preserved.
#
# Supersedes the 8 per-repo build-and-release.yml files that subtree-merged
# into apps/<svc>/.github/workflows/ — those are inert (GitHub only reads
# .github/workflows/ from repo root) and have been deleted.

on:
  push:
    branches: [main]
    # Skip the entire workflow when only docs/license files change. GitHub
    # evaluates paths-ignore at the trigger level — if every changed file
    # matches, the workflow doesn't run at all. Doc-only PRs to main don't
    # need test gates or deploys.
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - '**/LICENSE'
      - 'docs/**'
  pull_request:
    # Includes release/** so PRs landing into long-lived release branches
    # (release/rfpb-integration, release/bug-fixes-*, etc.) still get the
    # full test-unit + test-contract + test-e2e gating before merge. The
    # release branch itself only deploys when its PR into main lands.
    branches: [main, 'release/**']
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - '**/LICENSE'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      service:
        description: Which service to deploy (or "all")
        type: choice
        required: true
        default: all
        options:
          - all
          - ui
          - gateway
          - control-panel
          - viewer
          - plugins-api
          - external-api
          - mongo-backup
          - account-archive
      dry_run:
        description: "Dry run: build + push images, skip cluster apply"
        type: boolean
        required: false
        default: false
      skip_tests:
        description: "Emergency override: skip test gates. Use only when test infra is broken and a hotfix is required."
        type: boolean
        required: false
        default: false

# Serialize runs per branch. A new commit on a PR cancels the previous
# in-progress run for that branch (no point finishing tests on a stale SHA).
# main and workflow_dispatch runs NEVER cancel — we must never interrupt a
# live build, rollout, or post-deploy watch mid-flight.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  CLUSTER_ID: 4f1406fe-1179-4a9c-9d2e-835c3da34984
  REGISTRY: ghcr.io
  NAMESPACE: remote-falcon
  # Run JS-based actions (setup-node, setup-java, upload-artifact,
  # paths-filter, etc.) on Node 24 instead of the deprecated Node 20.
  # GitHub forces this default starting June 2nd, 2026 anyway; this
  # opts in early so we silence the deprecation warnings now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------
  # detect — decide which services to (re)deploy this run
  # ---------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.compute.outputs.services }}
    steps:
      - uses: actions/checkout@v5

      - id: changed
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          # Doc exclusion happens at the workflow trigger level (see
          # paths-ignore above) — if a PR is pure docs, the workflow
          # doesn't fire and we never reach this step. So these filters
          # just stay simple positive patterns.
          filters: |
            ui: ['apps/ui/**']
            gateway: ['apps/gateway/**']
            control-panel: ['apps/control-panel/**', 'libs/schema/**', 'libs/auth/**']
            viewer: ['apps/viewer/**', 'libs/schema/**']
            plugins-api: ['apps/plugins-api/**', 'libs/schema/**']
            external-api: ['apps/external-api/**', 'libs/schema/**', 'libs/auth/**']
            mongo-backup: ['apps/mongo-backup/**', 'libs/schema/**']
            account-archive: ['apps/account-archive/**', 'libs/schema/**']

      - id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
          CHANGES: ${{ steps.changed.outputs.changes }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_SERVICE" == "all" ]]; then
              services='["ui","gateway","control-panel","viewer","plugins-api","external-api","mongo-backup","account-archive"]'
            else
              services="[\"$INPUT_SERVICE\"]"
            fi
          else
            # paths-filter emits a JSON array of matched filter names
            services="${CHANGES:-[]}"
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Resolved services: $services"

  # ---------------------------------------------------------------
  # test-unit — per-service unit tests via reusable workflow
  # ---------------------------------------------------------------
  test-unit:
    needs: detect
    if: ${{ inputs.skip_tests != true && needs.detect.outputs.services != '[]' && needs.detect.outputs.services != '' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    uses: ./.github/workflows/_test-service.yml
    with:
      service: ${{ matrix.service }}

  # ---------------------------------------------------------------
  # test-contract — schema round-trip + plugin contract fixtures
  # ---------------------------------------------------------------
  test-contract:
    needs: detect
    if: ${{ inputs.skip_tests != true && needs.detect.outputs.services != '[]' && needs.detect.outputs.services != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run contract tests
        run: mvn -pl tests/contract -am test

  # ---------------------------------------------------------------
  # test-e2e — Playwright smoke tier against full dev stack
  # ---------------------------------------------------------------
  test-e2e:
    needs: detect
    if: ${{ inputs.skip_tests != true && needs.detect.outputs.services != '[]' && needs.detect.outputs.services != '' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install e2e deps
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Bring up dev stack (core mode — smoke tests need mongo+ui+control-panel+viewer+plugins-api only)
        env:
          DEV_UP_YES: "1"
        run: ./ops/dev-up.sh up --core

      - name: Health check stack (retry until ready, max ~3 min)
        env:
          DEV_UP_YES: "1"
        run: |
          set +e
          for i in $(seq 1 18); do
            if ./ops/dev-up.sh health --core; then
              echo "Stack healthy on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not yet healthy, sleeping 10s..."
            sleep 10
          done
          echo "Stack failed to become healthy after 3 minutes"
          ./ops/dev-up.sh health --core   # final pass for diagnostic output
          docker compose -f ops/docker-compose.dev.yml ps
          docker compose -f ops/docker-compose.dev.yml logs --tail=50
          exit 1

      - name: Run Playwright smoke
        working-directory: tests/e2e
        env:
          PLAYWRIGHT_TIER: smoke
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Tear down dev stack
        if: always()
        run: ./ops/dev-up.sh down --core

  # ---------------------------------------------------------------
  # build — build + push each changed service's image, IN PARALLEL
  # with the test gates. Pushes to GHCR tagged by SHA; layer-cached
  # against a per-service :buildcache tag. Not gated by skip_tests —
  # we always need the images to deploy.
  #
  # Runs only on push/workflow_dispatch (the deploy path), NOT on PRs:
  # PRs don't deploy, so building there would just add native-compile
  # minutes without benefit. This keeps PR runs as light as before
  # (test gates only) while the build overlaps the e2e gate on pushes.
  # ---------------------------------------------------------------
  build:
    needs: detect
    if: ${{
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.detect.outputs.services != '[]'
      && needs.detect.outputs.services != ''
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # Resolve build context, dockerfile, image tag, and the registry cache
      # refs (owner must be lowercased for GHCR).
      - name: Resolve per-service build config
        id: cfg
        env:
          SERVICE: ${{ matrix.service }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          owner_lc=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          image="${REGISTRY}/${owner_lc}/remote-falcon-${SERVICE}:${SHA}"
          cache_ref="${REGISTRY}/${owner_lc}/remote-falcon-${SERVICE}:buildcache"

          # Schema-consuming services use monorepo root context so libs/ is
          # COPYable; the rest are self-contained.
          case "$SERVICE" in
            control-panel|external-api|viewer|plugins-api|account-archive)
              context="."
              dockerfile="apps/$SERVICE/Dockerfile"
              ;;
            ui|gateway|mongo-backup)
              context="apps/$SERVICE"
              dockerfile="Dockerfile"
              ;;
            *)
              echo "Unknown service: $SERVICE" >&2
              exit 1
              ;;
          esac

          cache_from="type=registry,ref=${cache_ref}"
          cache_to="type=registry,ref=${cache_ref},mode=max"

          {
            echo "image=$image"
            echo "context=$context"
            echo "dockerfile=$dockerfile"
            echo "cache_from=$cache_from"
            echo "cache_to=$cache_to"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute UI build version
        id: date
        if: matrix.service == 'ui'
        run: echo "version=$(date -u +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Build and push (ui)
        if: matrix.service == 'ui'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.context }}/${{ steps.cfg.outputs.dockerfile }}
          push: true
          tags: ${{ steps.cfg.outputs.image }}
          cache-from: ${{ steps.cfg.outputs.cache_from }}
          cache-to: ${{ steps.cfg.outputs.cache_to }}
          # POSTHOG_CLI_API_KEY is the same Personal API Key already used by
          # the daily digest CronJob + the post-deploy error-rate check.
          # Scopes needed: error_tracking:write (plus the existing
          # query:read, insight:*, dashboard:*).
          build-args: |
            HOST_ENV=prod
            VERSION=${{ steps.date.outputs.version }}
            CONTROL_PANEL_API=https://remotefalcon.com/remote-falcon-control-panel
            VIEWER_API=https://remotefalcon.com/remote-falcon-viewer
            GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_KEY }}
            PUBLIC_POSTHOG_KEY=${{ secrets.PUBLIC_POSTHOG_KEY }}
            POSTHOG_CLI_API_KEY=${{ secrets.POSTHOG_API_KEY }}
            HOSTNAME_PARTS=2
            SWAP_CP=false
            VIEWER_PAGE_SUBDOMAIN=
            SOCIAL_META=<meta property='og:type' content='website'/><meta property='og:url' content='https://remotefalcon.com/'/><meta property='og:title' content='Remote Falcon'/><meta property='og:description' content='Create a custom website where viewers can request or vote for sequences to watch on your light show.'/><meta property='og:image' content='https://remotefalcon.com/jukebox.png'/>

      - name: Build and push (gateway)
        if: matrix.service == 'gateway'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.context }}/${{ steps.cfg.outputs.dockerfile }}
          push: true
          tags: ${{ steps.cfg.outputs.image }}
          cache-from: ${{ steps.cfg.outputs.cache_from }}
          cache-to: ${{ steps.cfg.outputs.cache_to }}
          build-args: |
            OTEL_OPTS=

      - name: Build and push (Quarkus services with Mongo build-arg)
        if: contains(fromJSON('["viewer","plugins-api","mongo-backup","account-archive"]'), matrix.service)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.context }}/${{ steps.cfg.outputs.dockerfile }}
          push: true
          tags: ${{ steps.cfg.outputs.image }}
          cache-from: ${{ steps.cfg.outputs.cache_from }}
          cache-to: ${{ steps.cfg.outputs.cache_to }}
          # OTEL_URI used to be baked in here from a build-time secret.
          # That secret holds a stale value (a now-dead IP) and the
          # runtime override via k8s env (PR #36) plus the application.properties
          # default ($OTEL_URI:http://otel-collector:4317) cover every
          # deploy mode. Build-arg dropped; org secret can be deleted.
          build-args: |
            MONGO_URI=${{ secrets.MONGO_URI }}

      - name: Build and push (Spring native services without build-args)
        if: contains(fromJSON('["control-panel","external-api"]'), matrix.service)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.context }}/${{ steps.cfg.outputs.dockerfile }}
          push: true
          tags: ${{ steps.cfg.outputs.image }}
          cache-from: ${{ steps.cfg.outputs.cache_from }}
          cache-to: ${{ steps.cfg.outputs.cache_to }}

  # ---------------------------------------------------------------
  # deploy — roll out each changed service's already-pushed image
  # ---------------------------------------------------------------
  deploy:
    needs: [detect, test-unit, test-contract, test-e2e, build]
    # Deploy only on push to main (which fires after PR merge) or explicit
    # workflow_dispatch — NEVER on pull_request. PRs must run the test gates
    # but must not modify the cluster.
    #
    # `!cancelled() && !failure()` (a status function) is required so the job
    # still runs when a *needed* job was SKIPPED rather than run — otherwise
    # GitHub auto-skips this job. That happens on two valid paths:
    #   - workflow_dispatch: test-e2e is skipped (its trigger excludes dispatch)
    #   - skip_tests=true:   test-unit/contract/e2e are all skipped
    # We still require detect+build to have actually succeeded (images must
    # exist), and `!failure()` ensures any test that DID run and failed blocks
    # the deploy.
    if: ${{ !cancelled() && !failure()
      && needs.detect.result == 'success'
      && needs.build.result == 'success'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.detect.outputs.services != '[]'
      && needs.detect.outputs.services != ''
      }}
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v5

      # -----------------------------------------------------------
      # Resolve per-service config (image tag must match what the
      # build job pushed; replica counts + resource limits feed
      # replace-tokens). The image is derived deterministically from
      # the SHA, identical to the build job's computation.
      # -----------------------------------------------------------
      - name: Resolve per-service config
        id: cfg
        env:
          SERVICE: ${{ matrix.service }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          owner_lc=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          image="${REGISTRY}/${owner_lc}/remote-falcon-${SERVICE}:${SHA}"

          # Per-service replicas + resources. Values mirror what each repo's
          # original build-and-release.yml shipped (also documented in SERVICES.md).
          # Tokens not referenced by a given service's manifest are simply ignored
          # by replace-tokens, so we set a superset here.
          #
          # control-panel + external-api both set replicas_min=2, replicas_max=4
          # because their k8s manifests' HPAs default to those values (legacy
          # from when each was a standalone repo with a deliberate capacity
          # choice). Mismatching the HPA's minReplicas here causes a post-apply
          # race: kubectl rollout completes with ready=1, HPA immediately bumps
          # spec.replicas to its minReplicas=2, the post-deploy verify step
          # reads spec=2/ready=1 mid-scale-up, and auto-rolls-back. Keep
          # replicas in lockstep with replicas_min for any HPA-managed service.
          case "$SERVICE" in
            ui)              replicas=1; replicas_min=1; replicas_max=1; req_mem=64Mi;   req_cpu=5m;   lim_mem=128Mi;  lim_cpu=100m  ;;
            gateway)         replicas=2; replicas_min=2; replicas_max=2; req_mem=1000Mi; req_cpu=750m; lim_mem=1250Mi; lim_cpu=1000m ;;
            control-panel)   replicas=2; replicas_min=2; replicas_max=4; req_mem=256Mi;  req_cpu=100m; lim_mem=512Mi;  lim_cpu=500m  ;;
            viewer)          replicas=1; replicas_min=1; replicas_max=1; req_mem=160Mi;  req_cpu=50m;  lim_mem=320Mi;  lim_cpu=500m  ;;
            plugins-api)     replicas=1; replicas_min=1; replicas_max=1; req_mem=192Mi;  req_cpu=150m; lim_mem=384Mi;  lim_cpu=750m  ;;
            external-api)    replicas=2; replicas_min=2; replicas_max=4; req_mem=256Mi;  req_cpu=100m; lim_mem=512Mi;  lim_cpu=500m  ;;
            mongo-backup)    replicas=1; replicas_min=1; replicas_max=1; req_mem=128Mi;  req_cpu=25m;  lim_mem=750Mi;  lim_cpu=200m  ;;
            account-archive) replicas=1; replicas_min=1; replicas_max=1; req_mem=64Mi;   req_cpu=10m;  lim_mem=128Mi;  lim_cpu=100m  ;;
          esac

          {
            echo "image=$image"
            echo "manifest=apps/$SERVICE/k8s/manifest.yml"
            echo "deployment=remote-falcon-$SERVICE"
            echo "replicas=$replicas"
            echo "replicas_min=$replicas_min"
            echo "replicas_max=$replicas_max"
            echo "req_mem=$req_mem"
            echo "req_cpu=$req_cpu"
            echo "lim_mem=$lim_mem"
            echo "lim_cpu=$lim_cpu"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------
      # Token-replace manifest, apply, monitor rollout
      # All cluster-side steps below are skipped when dry_run=true.
      # -----------------------------------------------------------
      - name: Replace tokens in manifest
        if: ${{ inputs.dry_run != true }}
        uses: cschleiden/replace-tokens@v1
        with:
          files: ${{ steps.cfg.outputs.manifest }}
        env:
          Namespace: ${{ env.NAMESPACE }}
          Application: remote-falcon-${{ matrix.service }}
          Image: ${{ steps.cfg.outputs.image }}
          Version: ${{ github.sha }}
          Env: prod
          Host: remotefalcon.com
          SubdomainHost: '*.remotefalcon.com'
          Replicas: ${{ steps.cfg.outputs.replicas }}
          Replicas.Min: ${{ steps.cfg.outputs.replicas_min }}
          Replicas.Max: ${{ steps.cfg.outputs.replicas_max }}
          Requests.Memory: ${{ steps.cfg.outputs.req_mem }}
          Requests.CPU: ${{ steps.cfg.outputs.req_cpu }}
          Limits.Memory: ${{ steps.cfg.outputs.lim_mem }}
          Limits.CPU: ${{ steps.cfg.outputs.lim_cpu }}

      - name: Install doctl
        if: ${{ inputs.dry_run != true }}
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        if: ${{ inputs.dry_run != true }}
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 ${{ env.CLUSTER_ID }}

      - name: kubectl apply
        if: ${{ inputs.dry_run != true }}
        run: kubectl apply -f ${{ steps.cfg.outputs.manifest }}

      - name: Wait for rollout
        if: ${{ inputs.dry_run != true }}
        run: kubectl rollout status deployment/${{ steps.cfg.outputs.deployment }} --namespace ${{ env.NAMESPACE }} --timeout=5m

      - name: Post-deploy verify
        id: verify
        if: ${{ inputs.dry_run != true }}
        env:
          DEPLOYMENT: ${{ steps.cfg.outputs.deployment }}
          EXPECTED_IMAGE: ${{ steps.cfg.outputs.image }}
          NS: ${{ env.NAMESPACE }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          live_image=$(kubectl get deployment "$DEPLOYMENT" -n "$NS" -o jsonpath='{.spec.template.spec.containers[0].image}')
          if [ "$live_image" != "$EXPECTED_IMAGE" ]; then
            echo "::error::$SERVICE: image mismatch. expected=$EXPECTED_IMAGE live=$live_image"
            exit 1
          fi
          ready=$(kubectl get deployment "$DEPLOYMENT" -n "$NS" -o jsonpath='{.status.readyReplicas}')
          spec=$(kubectl get deployment "$DEPLOYMENT" -n "$NS" -o jsonpath='{.spec.replicas}')
          if [ -z "$ready" ] || [ -z "$spec" ] || [ "$ready" != "$spec" ]; then
            echo "::error::$SERVICE: partial scale-up. ready=${ready:-0} spec=${spec:-?}"
            exit 1
          fi
          echo "::notice::Post-deploy verify passed for $SERVICE: image=$live_image ready=$ready/$spec"

      # Rollback for the immediate verify failure (image mismatch / partial
      # scale-up). The error-rate regression check + its rollback live in the
      # trailing post-deploy-watch job, off this critical path.
      - name: Auto-rollback on verify failure
        if: ${{ failure() && steps.verify.conclusion == 'failure' && inputs.dry_run != true }}
        env:
          DEPLOYMENT: ${{ steps.cfg.outputs.deployment }}
          NS: ${{ env.NAMESPACE }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          kubectl rollout undo deployment/"$DEPLOYMENT" -n "$NS"
          kubectl rollout status deployment/"$DEPLOYMENT" -n "$NS" --timeout=3m
          echo "::error::$SERVICE: post-deploy verify failed (image mismatch or partial scale-up); rolled back"

      - name: Dry-run summary
        if: ${{ inputs.dry_run == true }}
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE: ${{ steps.cfg.outputs.image }}
        run: |
          echo "::notice::Dry run for $SERVICE — image built and pushed to $IMAGE; cluster apply skipped."

  # ---------------------------------------------------------------
  # post-deploy-watch — error-rate regression check (Obs-4.4), moved
  # off the deploy critical path. One consolidated job (not per-service)
  # sleeps once, then checks each deployed service's error count vs. its
  # 24h baseline (normalized to the watch window). If a service exceeds
  # 3x baseline, that service is rolled back and the job fails.
  #
  # Why split out of deploy: the sleep used to run inline in every deploy
  # matrix leg, holding 8 runners idle and keeping the rollout from
  # reporting done for ~10min. Now deploy reports done after rollout+verify
  # and this trailing safety net runs once. Window cut 10m -> 5m for speed;
  # bump --watch-minutes / the sleep back up if a low-traffic service yields
  # noisy false negatives. Source + tunables: ops/release-validation/.
  # ---------------------------------------------------------------
  post-deploy-watch:
    needs: [detect, deploy]
    if: ${{
      inputs.dry_run != true
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.detect.outputs.services != '[]'
      && needs.detect.outputs.services != ''
      }}
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 1200 ${{ env.CLUSTER_ID }}

      - name: Watch error rate and roll back regressions
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          DISCORD_ALERTS_WEBHOOK: ${{ secrets.DISCORD_ALERTS_WEBHOOK }}
          NS: ${{ env.NAMESPACE }}
          SERVICES: ${{ needs.detect.outputs.services }}
        run: |
          set -uo pipefail
          echo "::notice::Waiting 5m for post-deploy traffic before evaluating error rates..."
          sleep 300

          fail=0
          for svc in $(echo "$SERVICES" | jq -r '.[]'); do
            dep="remote-falcon-$svc"
            echo "::notice::Checking error rate for $svc..."
            if python3 ops/release-validation/check.py --service "$svc" --watch-minutes 5 --multiplier 3.0; then
              echo "::notice::$svc: error rate within bounds"
            else
              echo "::error::$svc: post-deploy error-rate breach; rolling back $dep"
              kubectl rollout undo deployment/"$dep" -n "$NS" || true
              kubectl rollout status deployment/"$dep" -n "$NS" --timeout=3m || true
              fail=1
            fi
          done
          exit $fail
