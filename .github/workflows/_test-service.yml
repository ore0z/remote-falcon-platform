name: Test Service

# Reusable workflow: runs the appropriate unit-test command for a single
# service based on its build tool. Called from deploy.yml's test-unit
# matrix job, once per changed service.
#
# Build-tool resolution (shell case statement):
#   control-panel, external-api                -> Maven
#   viewer, plugins-api, mongo-backup,
#     account-archive                          -> Gradle
#   ui                                         -> Node + Vitest
#   gateway                                    -> no-op (config-only Spring
#                                                Cloud Gateway, 0 tests —
#                                                see docs/TESTING.md)

on:
  workflow_call:
    inputs:
      service:
        description: Service name (matches apps/<service>)
        type: string
        required: true

env:
  # Opt JS-based actions onto Node 24 — silences the Node-20
  # deprecation warning GitHub started showing in early 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 21
        if: inputs.service != 'ui'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Gradle
        if: contains(fromJSON('["viewer","plugins-api","mongo-backup","account-archive"]'), inputs.service)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ inputs.service }}-${{ hashFiles(format('apps/{0}/**/*.gradle*', inputs.service), format('apps/{0}/gradle/wrapper/gradle-wrapper.properties', inputs.service)) }}
          restore-keys: |
            gradle-${{ inputs.service }}-

      - name: Set up Node 22
        if: inputs.service == 'ui'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install libs/schema to mavenLocal (Gradle services consume via mavenLocal)
        if: contains(fromJSON('["viewer","plugins-api","mongo-backup","account-archive"]'), inputs.service)
        run: mvn -pl libs/schema -am -B install -DskipTests

      - name: Run tests
        env:
          SERVICE: ${{ inputs.service }}
        run: |
          set -euo pipefail
          # Each branch runs the test command that ALSO enforces the
          # service's coverage threshold. Without this, jacoco/vitest
          # gates are configured but never fire — see Phase C ratchet.
          case "$SERVICE" in
            control-panel|external-api)
              # `mvn verify` triggers the jacoco-check execution bound
              # to the verify phase; `mvn test` would skip it.
              mvn -pl "apps/$SERVICE" -am verify
              ;;
            gateway)
              # gateway is a config-only Spring Cloud Gateway. It has its own
              # apps/gateway/pom.xml but is intentionally not in the root
              # reactor — `mvn -pl apps/gateway -am test` fails to resolve
              # it. Per docs/TESTING.md there are no tests to run, so this
              # is a deliberate no-op.
              echo "gateway is a config-only Spring Cloud Gateway — no unit tests"
              ;;
            viewer|plugins-api|mongo-backup|account-archive)
              cd "apps/$SERVICE"
              # `./gradlew check` runs jacocoTestCoverageVerification
              # via `check.dependsOn jacocoTestCoverageVerification`.
              ./gradlew check
              ;;
            ui)
              cd apps/ui
              npm ci
              # `test:coverage` runs vitest with --coverage, which
              # applies the threshold block in vitest.config.ts.
              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts['test:coverage'] ? 0 : 1)"; then
                npm run test:coverage
              else
                echo "no UI test:coverage script yet"
                exit 0
              fi
              ;;
            *)
              echo "Unknown service: $SERVICE" >&2
              exit 1
              ;;
          esac

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service }}
          path: |
            apps/${{ inputs.service }}/target/site/jacoco/**
            apps/${{ inputs.service }}/build/reports/jacoco/**
            apps/${{ inputs.service }}/coverage/**
          if-no-files-found: ignore
          retention-days: 14
