# AWS S3 Configuration (DigitalOcean Spaces)
quarkus.s3.aws.region=${AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=${AWS_ACCESS_KEY_ID}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${AWS_SECRET_ACCESS_KEY}
quarkus.s3.endpoint-override=${BACKUP_S3_ENDPOINT:https://nyc3.digitaloceanspaces.com}
quarkus.s3.path-style-access=false
s3.bucket.name=${BACKUP_S3_BUCKET:remote-falcon-mongo-backup}

quarkus.package.jar.enabled=false
quarkus.http.root-path=/remote-falcon-mongo-backup
quarkus.http.port=8080

#MongoDB
quarkus.mongodb.database=remote-falcon
quarkus.mongodb.connection-string=${MONGO_URI}
# Pre-warm pool so first query per pod doesn't pay TCP+TLS+auth handshake. PERF-FIX-PLAN.md (Fix 4).
quarkus.mongodb.min-pool-size=5

#OpTel — ship traces over OTLP/gRPC to a cluster-local OTel Collector.
# The collector handles auth, protocol conversion, and routing to the cloud
# destination (PostHog Logs over HTTP). Services don't carry credentials and
# don't need framework-specific tech-preview features.
#
# OTEL_URI defaults to the local collector at otel-collector:4317; override
# via env var in prod k8s (e.g., otel-collector.observability.svc.cluster.local).
quarkus.otel.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_URI:http://otel-collector:4317}
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.resource.attributes=service.name=remote-falcon-mongo-backup,deployment.environment=prod
quarkus.application.name=remote-falcon-mongo-backup

# API authentication
backup.auth.token=${BACKUP_AUTH_TOKEN}

# Backup schedule (Quarkus @Scheduled cron expression + tz)
backup.cron=${BACKUP_CRON:0 0 12 * * ?}
backup.timezone=${BACKUP_TIMEZONE:America/Chicago}
