# Test config — values are overridden by MongoBackupTestResource at runtime,
# but we must give Quarkus defaults so config resolution at startup succeeds
# without requiring env vars.

quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=remote-falcon

quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=test
quarkus.s3.aws.credentials.static-provider.secret-access-key=test
quarkus.s3.endpoint-override=http://localhost:4566
quarkus.s3.path-style-access=true
s3.bucket.name=test-bucket-fixture

quarkus.http.test-port=0
quarkus.http.root-path=/remote-falcon-mongo-backup

backup.auth.token=test-token
backup.cron=disabled
backup.timezone=UTC

# Don't let the @Scheduled cron fire during tests.
quarkus.scheduler.enabled=false
