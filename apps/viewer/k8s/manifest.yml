---
apiVersion: v1
kind: Namespace
metadata:
  name: #{Namespace}#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: #{Application}#
  namespace: #{Namespace}#
  labels:
    app: #{Application}#
spec:
  replicas: #{Replicas.Min}#
  selector:
    matchLabels:
      app: #{Application}#
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: #{Application}#
    spec:
      containers:
        - name: #{Application}#
          image: #{Image}#
          resources:
            requests:
              memory: #{Requests.Memory}#
              cpu: #{Requests.CPU}#
            limits:
              memory: #{Limits.Memory}#
              cpu: #{Limits.CPU}#
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-connection
                  key: MONGO_URI
            # Point OTel exporter at the in-cluster collector (DaemonSet
            # in this namespace; see ops/k8s/otel-collector/). Overrides
            # the build-time-baked OTEL_URI from the GH org secret (which
            # still holds a stale legacy value pointing at a now-dead IP).
            # application.properties reads ${OTEL_URI:default}.
            - name: OTEL_URI
              value: "http://otel-collector.remote-falcon.svc.cluster.local:4317"
          startupProbe:
            httpGet:
              path: /remote-falcon-viewer/q/health
              port: 8080
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /remote-falcon-viewer/q/health/live
              port: 8080
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /remote-falcon-viewer/q/health/ready
              port: 8080
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
      imagePullSecrets:
        - name: remote-falcon-ghcr
---
apiVersion: v1
kind: Service
metadata:
  name: #{Application}#
  namespace: #{Namespace}#
  labels:
    app: #{Application}#
spec:
  type: ClusterIP
  selector:
    app: #{Application}#
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: #{Application}#
  namespace: default
  labels:
    release: kube-prometheus-stack-1768012917
spec:
  namespaceSelector:
    matchNames:
      - #{Namespace}#
  selector:
    matchLabels:
      app: #{Application}#
  endpoints:
    - port: http
      path: /remote-falcon-viewer/q/metrics
      interval: 30s
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: #{Application}#
  namespace: #{Namespace}#
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  tls:
    - hosts:
        - #{Host}#
      secretName: remote-falcon-tls
  rules:
    - host: #{Host}#
      http:
        paths:
          - pathType: Prefix
            path: /remote-falcon-viewer
            backend:
              service:
                name: #{Application}#
                port:
                  number: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: #{Application}#
  namespace: #{Namespace}#
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: #{Application}#
  minReplicas: #{Replicas.Min}#
  maxReplicas: #{Replicas.Max}#
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 85
