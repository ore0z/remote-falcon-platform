# Test config — values are overridden by AccountArchiveTestResource at runtime,
# but we must give Quarkus defaults so config resolution at startup succeeds
# without requiring env vars.

quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=remote-falcon

quarkus.http.test-port=0
quarkus.http.root-path=/remote-falcon-account-archive

# Don't let the @Scheduled cron fire during tests.
quarkus.scheduler.enabled=false
