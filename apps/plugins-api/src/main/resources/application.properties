quarkus.package.jar.enabled=true
quarkus.http.root-path=/
quarkus.http.port=8080
quarkus.http.proxy.allow-forwarded=true
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true
#MongoDB
quarkus.mongodb.database=remote-falcon
quarkus.mongodb.connection-string=${MONGO_URI}
# Pre-warm pool so first query per pod doesn't pay TCP+TLS+auth handshake. PERF-FIX-PLAN.md (Fix 4).
quarkus.mongodb.min-pool-size=5
# Match the viewer's UUID representation. ShowRepository.findByShowToken
# currently excludes the `pages` projection so the BSONException on subtype-3
# pageIds (written by Spring Data Mongo) doesn't surface yet — but any future
# path that reads pages without that exclude would NPE the entire request.
# Closing the asymmetry at the config layer so the bug can't reappear.
quarkus.mongodb.uuid-representation=JAVA_LEGACY
#Component Scans
quarkus.index-dependency.remote-falcon-library.group-id=com.remotefalcon
quarkus.index-dependency.remote-falcon-library.artifact-id=remote-falcon-library
#OpTel — ship OTLP/gRPC to a cluster-local OTel Collector (the modern
# replacement for the now-retired Datadog Agent the previous maintainer
# pointed this at). The collector owns auth + protocol conversion + routing
# to the cloud destination (PostHog Logs over HTTP).
#
# OTEL_URI defaults to the local compose collector; prod k8s overrides
# it to the in-cluster service DNS name.
quarkus.otel.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_URI:http://otel-collector:4317}
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.resource.attributes=service.name=remote-falcon-plugins-api,deployment.environment=prod
quarkus.application.name=remote-falcon-plugins-api

# Surface exporter failures (drops, timeouts, etc.) at WARN. The previous
# maintainer had this at OFF, which is exactly why the broken Datadog
# pipeline ran silently for an unknown stretch of time.
quarkus.log.category."io.quarkus.opentelemetry.runtime".level=WARN

#CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=*
quarkus.http.cors.headers=*
sequence.limit:500

quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true