# OpenTelemetry Collector config — prod cluster.
#
# Differs from ops/otel-collector-config.yaml (local compose) in one place:
# the filelog `include` paths point at the k8s kubelet's container log
# layout (/var/log/containers/*.log are symlinks to /var/log/pods/.../...),
# not docker's /var/lib/docker/containers/* layout.
#
# Receives: OTLP/gRPC on :4317, OTLP/HTTP on :4318 (from services that push
#   signals directly, e.g. Quarkus traces).
# Tails: container stdout/stderr via filelog reading kubelet's log files
#   (works for every service without any code change).
# Exports: PostHog Logs over OTLP/HTTP. Bearer token sourced from the
#   PUBLIC_POSTHOG_KEY env var in the DaemonSet pod spec.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: remote-falcon
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Tails container stdout/stderr via kubelet's log files. In k8s,
      # /var/log/containers/<pod>_<namespace>_<container>-<id>.log is a
      # symlink to /var/log/pods/<...>/<container>/0.log. Mounting both
      # paths handles either layout.
      filelog:
        include: [/var/log/pods/remote-falcon_*/*/*.log]
        # Skip the collector's own log files. Done at the receiver layer
        # (not a downstream filter) because the `container` operator below
        # only parses containerd format; the collector's Go log lines fall
        # through without k8s.* resource attributes set, so a filter keyed
        # on resource.attributes["k8s.container.name"] is a no-op.
        exclude: [/var/log/pods/remote-falcon_otel-collector-*/*/*.log]
        # Don't ship historical lines on collector start — only new ones.
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # OTel's stanza `container` operator does in one step what we
          # previously did manually with regex_parser + severity mapping:
          #   1. Parses containerd/docker log line format (timestamp,
          #      stream, partial/full marker, body).
          #   2. Promotes k8s metadata from the file path to RESOURCE
          #      attributes: k8s.namespace.name, k8s.pod.name,
          #      k8s.container.name, k8s.container.restart_count.
          # Without these resource attributes, downstream filters and
          # PostHog's service filters are inert.
          - type: container
            format: containerd

          # Map container name to OTel's canonical service.name resource
          # attribute. The Quarkus services that push OTLP signals
          # directly already set service.name themselves; this only
          # affects records flowing through the filelog receiver.
          - type: copy
            from: resource["k8s.container.name"]
            to: resource["service.name"]

          - type: add
            field: resource["deployment.environment"]
            value: prod

    processors:
      # Batch records before export — reduces request rate to PostHog.
      batch:
        timeout: 5s
        send_batch_size: 512

    exporters:
      otlphttp/posthog:
        logs_endpoint: https://us.i.posthog.com/i/v1/logs
        headers:
          Authorization: "Bearer ${env:PUBLIC_POSTHOG_KEY}"
        compression: gzip

    extensions:
      # Exposes /health on :13133 — used by the DaemonSet liveness probe.
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp, filelog]
          processors: [batch]
          exporters: [otlphttp/posthog]

      telemetry:
        logs:
          level: info
