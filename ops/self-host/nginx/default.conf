# Self-host nginx reverse proxy.
#
# Routes the user-facing URL paths to the right backend containers, matching
# the prod ingress rules so the UI's hardcoded API URLs work the same way
# locally and in self-host as they do on the SaaS.
#
# SSL: drop your fullchain + key into ./nginx/ssl/ (mounted at /etc/ssl/rf
# inside the container). The two-cert path below is what Let's Encrypt /
# certbot produce by default.
#
# Lazy DNS resolution: every proxy_pass uses a $variable so nginx defers the
# upstream lookup from config-load time to request time. Without this, nginx
# refuses to start if any upstream container is briefly down (e.g. during
# `docker compose up` before all containers register in DNS). With it, the
# stack comes up cleanly and an unhealthy upstream 502s at request time.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge for Let's Encrypt cert issuance / renewal. If you're
    # using certbot's --webroot mode, point it here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ssl/rf/fullchain.pem;
    ssl_certificate_key /etc/ssl/rf/privkey.pem;

    # Recommended TLS settings (Mozilla "intermediate" profile, simplified).
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Docker Compose's embedded DNS resolver. valid=30s caches lookups briefly.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Body size cap for show-asset uploads (sequence sync, image hosting).
    client_max_body_size 10m;

    # UI (root + static assets).
    location / {
        set $upstream_ui http://ui:3000;
        proxy_pass $upstream_ui;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Control-panel GraphQL + REST.
    location /remote-falcon-control-panel {
        set $upstream_cp http://control-panel:8080;
        proxy_pass $upstream_cp;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Viewer GraphQL.
    location /remote-falcon-viewer {
        set $upstream_viewer http://viewer:8080;
        proxy_pass $upstream_viewer;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plugins API for the FPP plugin.
    location /remote-falcon-plugins-api {
        set $upstream_plugins http://plugins-api:8080;
        proxy_pass $upstream_plugins;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
