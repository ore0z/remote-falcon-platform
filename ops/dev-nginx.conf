# Mirrors the production nginx-ingress routing rules so UI <-> API URLs match
# prod exactly. Browse to http://localhost:8080.
#
# Lazy upstream resolution: every proxy_pass uses a variable so nginx defers
# DNS lookup from config-load time to request time. This matters because:
#   1. In core (self-host) mode, several upstreams (gateway, external-api,
#      mongo-backup, account-archive) intentionally aren't started -- nginx
#      with non-lazy resolution would refuse to start at all.
#   2. Even in platform mode, nginx can race docker-compose's DNS registration
#      and fail "host not found" on first boot.
# Lazy resolution lets nginx come up cleanly; absent services 502 at request
# time, which is the desired behavior.

# Rate-limit zone for the /ingest/ PostHog reverse proxy. Keyed on client
# IP. 30r/s with burst=20 nodelay handles a normal page load (pageview +
# autocapture flurry + a /decide call) and still chokes a relay-abuse client
# trying to use us as a free PostHog tunnel. Kept in lockstep with the prod
# ingress annotations in apps/ui/k8s/manifest.yml.
limit_req_zone $binary_remote_addr zone=posthog_ingest:10m rate=30r/s;
limit_req_status 429;

server {
    listen 8080 default_server;
    server_name _;

    # Docker Compose's embedded DNS resolver. valid=30s caches lookups briefly
    # so we don't hammer DNS on every request.
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 3m;

    # PostHog reverse proxy — circumvents ad-blockers / DNS filters
    # (~25-30% of real users) that block requests to us.i.posthog.com by
    # URL pattern. Browser fires POST /ingest/e/ on our own origin instead.
    #
    # Hardened against relay abuse (issue #129): every /ingest/ location is
    # path-allowlisted, method-allowlisted, body-size-capped, and rate-limited.
    # An unauthenticated third party can otherwise relay arbitrary POSTs to
    # us.i.posthog.com via our origin and burn the project quota.
    #
    # Allowlisted paths (verified against posthog-js@1.140.1 dist/module.js):
    #   /ingest/static/<file>       SDK loader + lazy modules (GET)
    #   /ingest/array.js | array.full.js  bootstrap bundle    (GET)
    #   /ingest/recorder.js         legacy session-recording loader (GET)
    #   /ingest/decide/             feature-flag + config endpoint   (GET/POST)
    #   /ingest/e/ | /ingest/e      event capture                    (POST)
    #   /ingest/i/                  identify                         (POST)
    #   /ingest/s/                  session recording snapshots      (POST)
    #   /ingest/engage/             people / engage                  (POST)
    #   /ingest/batch/              batched events                   (POST)
    # Anything else under /ingest/ returns 404 at the nginx layer.
    #
    # Public DNS resolver required because the upstreams aren't in Docker's
    # internal DNS. valid=300s caches so we don't hammer 1.1.1.1 on every req.
    location ^~ /ingest/static/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        limit_req zone=posthog_ingest burst=20 nodelay;
        resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;
        proxy_pass             https://us-assets.i.posthog.com/static/;
        proxy_ssl_server_name  on;
        proxy_set_header       Host us-assets.i.posthog.com;
        proxy_redirect         off;
        proxy_buffering        on;
    }

    # Loader bundles that posthog-js fetches by name (not under /static/).
    # Strips the `/ingest` prefix before proxying so `/ingest/array.js` →
    # `https://us-assets.i.posthog.com/array.js`. `rewrite ... break` updates
    # $uri so the variable proxy_pass picks up the rewritten path.
    location ~ ^/ingest/(array\.js|array\.full\.js|recorder\.js)$ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        limit_req zone=posthog_ingest burst=20 nodelay;
        resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;
        set $ph_assets us-assets.i.posthog.com;
        rewrite ^/ingest/(.*)$ /$1 break;
        proxy_pass             https://$ph_assets;
        proxy_ssl_server_name  on;
        proxy_set_header       Host us-assets.i.posthog.com;
        proxy_redirect         off;
        proxy_buffering        on;
    }

    # Ingest endpoints — event capture, session recording, feature flags.
    # Explicit allowlist; anything else 404s via the catch-all below.
    # `rewrite ... break` strips `/ingest` so PostHog's edge sees the path
    # it expects (e.g. `/e/` instead of `/ingest/e/`).
    location ~ ^/ingest/(e/?|i/|s/|engage/|batch/|decide/) {
        if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }
        limit_req zone=posthog_ingest burst=20 nodelay;
        client_max_body_size   1m;
        resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;
        set $ph_ingest us.i.posthog.com;
        rewrite ^/ingest/(.*)$ /$1 break;
        proxy_pass             https://$ph_ingest;
        proxy_ssl_server_name  on;
        proxy_set_header       Host us.i.posthog.com;
        proxy_redirect         off;
        proxy_buffering        on;
    }

    # Catch-all for everything else under /ingest/. Closes the open-relay
    # surface so an attacker can't tunnel arbitrary PostHog paths via us.
    # Plain prefix (NOT `^~`) so the regex locations above are still tried
    # first for /ingest/e/, /ingest/decide/, etc.
    location /ingest/ {
        return 404;
    }

    # UI (root + static assets)
    location / {
        set $upstream_ui http://ui:3000;
        proxy_pass $upstream_ui;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend services that DON'T rewrite the path (the apps own the prefix).
    location /remote-falcon-control-panel {
        set $upstream_cp http://control-panel:8080;
        proxy_pass $upstream_cp;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /remote-falcon-viewer {
        set $upstream_viewer http://viewer:8080;
        proxy_pass $upstream_viewer;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /remote-falcon-mongo-backup {
        set $upstream_mb http://mongo-backup:8080;
        proxy_pass $upstream_mb;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /remote-falcon-account-archive {
        set $upstream_aa http://account-archive:8080;
        proxy_pass $upstream_aa;
    }

    location /remote-falcon-gateway {
        set $upstream_gw http://gateway:8080;
        proxy_pass $upstream_gw;
    }

    # Backend services WITH path rewrite (matches the prod ingress regex).
    location ~ ^/remote-falcon-external-api(/|$)(.*) {
        set $upstream_ea http://external-api:8080;
        proxy_pass $upstream_ea/$2$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location ~ ^/remotefalcon/api/external(/|$)(.*) {
        set $upstream_ea http://external-api:8080;
        proxy_pass $upstream_ea/$2$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location ~ ^/remote-falcon-plugins-api(/|$)(.*) {
        set $upstream_pa http://plugins-api:8080;
        proxy_pass $upstream_pa/$2$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location ~ ^/remotefalcon/api(/|$)(.*) {
        set $upstream_pa http://plugins-api:8080;
        proxy_pass $upstream_pa/$2$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
