# Declarative PostHog dashboards for Remote Falcon.
#
# Each dashboard references insights by name (from insights.yml). The
# apply script resolves names to IDs at apply time and links them via
# the insight's `dashboards` field.

dashboards:
  - name: rf-frontend-health
    description: >-
      Frontend health dashboard. Top-line pageview + exception numbers,
      24h pageview trend, 7d exception trend, plus top-paths and
      top-exception-messages tables. Pair with backend signals via the
      daily PostHog digest in #alerts and the alerts in
      ops/posthog-alerts/.
    insights:
      - rf-frontend-pageviews-7d
      - rf-frontend-exceptions-7d
      - rf-frontend-pageviews-trend-24h
      - rf-frontend-exceptions-trend-7d
      - rf-frontend-top-pageview-paths-24h
      - rf-frontend-top-exception-messages-7d

  - name: rf-notification-engagement
    description: >-
      Notification system health and operator activity dashboard.
      Surfaces send cadence (broadcasts vs per-show DMs), edit and
      delete rates as quality / regret signals, end-user bell
      engagement, and a click breakdown by notification type. The
      "recent broadcasts" tile gives the operator a one-glance audit of
      what's gone out lately without dropping into Mongo. Source events
      ship from the bell (PRD-002, PR #41) and the admin send form
      (PRD-004, PR #42).
    insights:
      - rf-notifications-sent-30d
      - rf-notifications-sent-trend-30d
      - rf-notifications-edit-rate-30d
      - rf-notifications-delete-rate-30d
      - rf-notifications-bell-opens-trend-30d
      - rf-notifications-click-breakdown-7d
      - rf-notifications-recent-broadcasts-30d
